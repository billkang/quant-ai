schema: spec-driven

context: |
  Tech stack: React + Vite + Ant Design, FastAPI + SQLAlchemy, PostgreSQL + Redis
  Domain: 量化投资辅助系统 (Quant AI)
  Data sources: AkShare (A股), yfinance (港股)
  Deployment: Docker Compose

rules:
  tasks:
    - Focus on MVP features first
    - Use Ant Design components (not raw HTML) for UI
    - Test changes with docker-compose up -d --build

artifacts:
  design:
    - Include architecture decisions and trade-offs
  spec:
    - Use Gherkin-style scenarios (WHEN/THEN)
    - List API endpoints with path and methods
  tasks:
    - Break into testable chunks
    - Include verification steps