services:

  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: quant-ai-db
    env_file:
      - ./server/.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-quantai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quantai123}
      POSTGRES_DB: ${POSTGRES_DB:-quant_ai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quantai}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    restart: unless-stopped

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: quant-ai-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    restart: unless-stopped

  # 后端服务
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: quant-ai-server
    ports:
      - "8000:8000"
    env_file:
      - ./server/.env
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  # 前端服务 (Nginx)
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: quant-ai-client
    ports:
      - "4000:80"
    depends_on:
      - server
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  postgres_data:
  redis_data:
